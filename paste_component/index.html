<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Streamlit Paste Component</title>
  </head>
  <body>
    <script>
      // Enviar datos a Streamlit
      function sendValueToStreamlit(value) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: "streamlit:setComponentValue",
          value: value
        }, "*");
      }

      // Indicar que estamos listos
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setComponentReady",
        apiVersion: 1
      }, "*");

      // Ocultar el iframe para que no ocupe espacio
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: "streamlit:setFrameHeight",
        height: 0
      }, "*");

      // Detección de dispositivos móviles
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      // SÓLO si es Desktop, agregamos el interceptor global
      if (!isMobile) {
        window.parent.document.addEventListener('paste', function(e) {
          // Buscamos si en el portapapeles hay una imagen
          var items = e.clipboardData.items;
          for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf("image") !== -1) {
              var blob = items[i].getAsFile();
              var reader = new FileReader();
              reader.onload = function(event) {
                // event.target.result es el Base64 de la imagen
                sendValueToStreamlit(event.target.result);
              };
              reader.readAsDataURL(blob);
              break; // Solo tomamos la primera imagen
            }
          }
        });
      }
    </script>
  </body>
</html>
